name: Build and release mod

# Push a tag like "v0.1.0" and this builds the jar and attaches it to a
# GitHub Release. The launcher's ensureNebulaMod() downloads the newest
# release's .jar asset automatically — see src/main/main.js.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: chmod +x ./gradlew
      - run: gradle wrapper --gradle-version 8.10
      - run: ./gradlew build
      - uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
